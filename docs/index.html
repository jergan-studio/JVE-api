<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JVE API Docs</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-bottom: 5px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 15px 0;
  border-radius: 6px;
  border: none;
  outline: none;
  background: #111;
  color: white;
  font-size: 14px;
}

.box {
  background: #1a1a1a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
}

code {
  background: #222;
  padding: 3px 6px;
  border-radius: 4px;
  display: inline-block;
  margin-top: 5px;
}

/* results container */
#results {
  margin-top: 10px;
}

/* right click menu */
#contextMenu {
  position: fixed;
  width: 240px;
  background: #1a1a1a;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 8px;
  z-index: 9999;
}

#ctxSearch {
  width: 100%;
  padding: 8px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>⚡ JVE API Documentation</h1>
<p>Browser-based command runtime API for HTML & JS interaction.</p>

<!-- MAIN SEARCH -->
<input id="search" placeholder="Search JVE commands (var, draw, alert...)" />

<!-- RESULTS -->
<div id="results" class="box">
  <p>Type to search JVE commands...</p>
</div>

<!-- RIGHT CLICK MENU -->
<div id="contextMenu" class="hidden">
  <input id="ctxSearch" placeholder="Search JVE docs..." />
</div>

<script>
/* =========================
   COMMAND DATABASE
========================= */
const COMMANDS = [
  {
    name: "var",
    type: "core",
    desc: "Creates a variable in JVE memory",
    usage: "var health 100"
  },
  {
    name: "add",
    type: "core",
    desc: "Adds value to a variable",
    usage: "add health 10"
  },
  {
    name: "set",
    type: "core",
    desc: "Sets variables or engine settings (like multiplayer)",
    usage: "set multiplayer true"
  },
  {
    name: "alert",
    type: "html",
    desc: "Shows browser alert popup",
    usage: "alert Hello World"
  },
  {
    name: "draw",
    type: "html",
    desc: "Draws shapes on the screen",
    usage: "draw circle 0 0 100 100"
  }
];

/* =========================
   SEARCH SYSTEM
========================= */
const search = document.getElementById("search");
const results = document.getElementById("results");

function render(list) {
  if (list.length === 0) {
    results.innerHTML = "<p>No commands found.</p>";
    return;
  }

  results.innerHTML = list.map(cmd => `
    <div class="box">
      <h2>${cmd.name}</h2>
      <p><b>Type:</b> ${cmd.type}</p>
      <p>${cmd.desc}</p>
      <code>${cmd.usage}</code>
    </div>
  `).join("");
}

search.addEventListener("input", function () {
  const value = this.value.toLowerCase().trim();

  if (!value) {
    results.innerHTML = "<p>Type to search JVE commands...</p>";
    return;
  }

  const matches = COMMANDS.filter(cmd =>
    cmd.name.includes(value) ||
    cmd.desc.toLowerCase().includes(value) ||
    cmd.type.includes(value)
  );

  render(matches);
});

/* =========================
   RIGHT CLICK SEARCH
========================= */
const menu = document.getElementById("contextMenu");
const ctxSearch = document.getElementById("ctxSearch");

document.addEventListener("contextmenu", (e) => {
  e.preventDefault();

  menu.classList.remove("hidden");
  menu.style.top = e.pageY + "px";
  menu.style.left = e.pageX + "px";

  ctxSearch.focus();
});

document.addEventListener("click", () => {
  menu.classList.add("hidden");
});

ctxSearch.addEventListener("input", function () {
  const value = this.value.toLowerCase().trim();

  const matches = COMMANDS.filter(cmd =>
    cmd.name.includes(value) ||
    cmd.desc.toLowerCase().includes(value)
  );

  render(matches);
});
</script>

</body>
</html>
